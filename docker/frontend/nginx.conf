# =============================================
# nginx config — Student-Cash Frontend
# Serves the Vite SPA and proxies /api to the
# backend container on the internal Docker network
# =============================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API Reverse Proxy ────────────────────────────────────
    # All requests to /api/... are forwarded to the backend
    # service. The browser never directly contacts the backend;
    # it stays inside the private app-network.
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── SPA Fallback ─────────────────────────────────────────
    # Return index.html for any route not matched above so
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Static asset caching ─────────────────────────────────
    # Vite hashes all asset filenames, so they can be cached
    # aggressively without risking stale files.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
